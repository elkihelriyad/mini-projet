<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - ENSA Guide</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #ca6f1e;
            --primary-light: #fdf5ef;
            --text-main: #1e293b;
            --text-light: #64748b;
            --bg-body: #f1f5f9;
            --white: #ffffff;
            --success: #22c55e;
            --danger: #ef4444;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        /* Navbar */
        .admin-nav {
            background-color: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 3rem;
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: transform 0.3s ease;
        }

        .brand:hover {
            transform: scale(1.02);
        }

        .brand span {
            color: var(--primary);
        }

        .badge-admin {
            background: #fef3c7;
            color: #d97706;
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
            margin-left: 0.5rem;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-item {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 500;
            padding: 1.4rem 0;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .nav-item:hover,
        .nav-item.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .admin-profile {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            cursor: pointer;
        }

        .avatar {
            width: 36px;
            height: 36px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        /* Layout */
        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        /* Cards */
        .card {
            background: var(--white);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .page-title h1 {
            font-size: 1.8rem;
            margin: 0 0 0.5rem 0;
        }

        .page-title p {
            color: var(--text-light);
            margin: 0;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-outline {
            background: white;
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        /* Tables */
        .table-container {
            background: white;
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8fafc;
            text-align: left;
            padding: 1rem 1.5rem;
            font-weight: 600;
            color: var(--text-light);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            color: var(--text-main);
            vertical-align: middle;
        }

        tr:hover td {
            background: #fcfcfc;
        }

        /* Status Badges */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .status-active {
            background: #dcfce7;
            color: #15803d;
        }

        .status-inactive {
            background: #fee2e2;
            color: #b91c1c;
        }

        .filiere-tag {
            background: #f1f5f9;
            color: var(--text-light);
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .filters-bar {
            background: white;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            border: 1px solid var(--border);
        }

        .search-input {
            flex: 1;
            padding: 0.6rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
        }

        select {
            padding: 0.6rem 2rem 0.6rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: white;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <nav class="admin-nav"
        style="background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);">
        <div class="nav-left">
            <a href="#" class="brand" style="display: flex; align-items: center; gap: 1rem; text-decoration: none;">
                <div class="brand-logo-wrapper"
                    style="width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; background: var(--primary); border-radius: 12px; box-shadow: 0 4px 15px rgba(202, 111, 30, 0.3); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);"
                    onmouseover="this.style.backgroundColor='var(--primary-dark)'; this.style.boxShadow='0 8px 25px rgba(202, 111, 30, 0.45)'; this.style.transform='translateY(-2px)'; this.querySelector('svg').style.transform='rotate(15deg) scale(1.15)'"
                    onmouseout="this.style.backgroundColor='var(--primary)'; this.style.boxShadow='0 4px 15px rgba(202, 111, 30, 0.3)'; this.style.transform='translateY(0)'; this.querySelector('svg').style.transform='rotate(0) scale(1)'">
                    <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-label="ENSA Guide Logo" style="transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="2" x2="12" y2="4"></line>
                        <line x1="12" y1="20" x2="12" y2="22"></line>
                        <line x1="2" y1="12" x2="4" y2="12"></line>
                        <line x1="20" y1="12" x2="22" y2="12"></line>
                        <path d="M16.24 7.76l-2.12 6.36-6.36 2.12 2.12-6.36z"></path>
                    </svg>
                </div>
                <div class="brand-text" style="display: flex; flex-direction: column;">
                    <span class="brand-name"
                        style="font-size: 1.5rem; font-weight: 800; color: var(--text-main); letter-spacing: -0.5px;">ENSA<span
                            style="color: var(--primary);">Guide</span></span>
                </div>
            </a>
            <div class="nav-links" style="margin-left: 2rem;">
                <a href="{{ url_for('admin_routes.admin_analytics') }}"
                    class="nav-item {% if active_page == 'analytics' %}active{% endif %}">Analytiques</a>
                <a href="{{ url_for('admin_routes.admin_users') }}"
                    class="nav-item {% if active_page == 'users' %}active{% endif %}">Étudiants</a>
            </div>
        </div>
        <div class="nav-right">
            <a href="{{ url_for('main_routes.logout') }}" title="Déconnexion"
                style="color: var(--text-light); font-size: 1.2rem; transition: color 0.2s; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; text-decoration: none;"
                onmouseover="this.style.color='var(--danger)'; this.style.backgroundColor='#fee2e2'"
                onmouseout="this.style.color='var(--text-light)'; this.style.backgroundColor='transparent'">
                <i class="fas fa-sign-out-alt"></i>
            </a>
        </div>
    </nav>

    <div class="container">
        {% block admin_content %}{% endblock %}
    </div>
</body>

</html>
